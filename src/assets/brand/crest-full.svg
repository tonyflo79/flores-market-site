<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="The Flores Market crest">
  <title>The Flores Market</title>
  <!-- Two-tone version: bone fills on ink shield. -->
  <defs>
    <style>
      .ink  { fill: #14110F; }
      .bone { fill: #F2EDE4; }
      .sangre { fill: #5C1F1B; }
    </style>
  </defs>

  <g>
    <!-- Top banner shape -->
    <path class="bone" d="M20 30 L40 16 L160 16 L180 30 L168 44 L180 58 L160 44 L40 44 L20 58 L32 44 Z"/>
    <text x="100" y="38" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="16" font-weight="700" letter-spacing="4" class="ink">FLORES</text>

    <!-- Shield body filled in bone, inner dark panel for portrait -->
    <path class="bone" d="M40 52 L160 52 L160 140 C160 170 135 190 100 210 C65 190 40 170 40 140 Z"/>
    <path class="ink"  d="M50 62 L150 62 L150 138 C150 164 128 182 100 198 C72 182 50 164 50 138 Z"/>

    <!-- Portrait silhouette in bone -->
    <g transform="translate(100 130)">
      <path class="bone" d="M-34 40 C-34 20 -20 10 0 10 C20 10 34 20 34 40 L34 50 L-34 50 Z"/>
      <rect class="bone" x="-8" y="-2" width="16" height="14"/>
      <ellipse class="bone" cx="0" cy="-22" rx="20" ry="24"/>
      <path class="bone" d="M-24 -32 L24 -32 L22 -42 L-22 -42 Z"/>
      <path class="bone" d="M-28 -30 L28 -30 L28 -26 L-28 -26 Z"/>
      <!-- mustache in sangre for heritage pop -->
      <path class="sangre" d="M-10 -10 Q0 -6 10 -10 Q8 -4 0 -3 Q-8 -4 -10 -10 Z"/>
    </g>

    <!-- Bottom banner -->
    <path class="bone" d="M30 186 L50 172 L150 172 L170 186 L158 200 L170 214 L150 200 L50 200 L30 214 L42 200 Z"/>
    <text x="100" y="194" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-size="16" font-weight="700" letter-spacing="4" class="ink">MARKET</text>
  </g>
</svg>
